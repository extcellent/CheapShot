<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Movies - CheapShot</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e8e8f0;
            line-height: 1.6;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #14141c;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a4a;
        }

        /* ===== NAVIGATION ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 24px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-weight: 400;
            -webkit-text-fill-color: #6b6b80;
        }

        .back-btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #8888a0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s;
            background: transparent;
            cursor: pointer;
        }

        .back-btn:hover {
            color: #e8e8f0;
            background: rgba(255, 255, 255, 0.05);
        }

        /* ===== HERO ===== */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 16px;
        }

        .hero h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 16px;
            color: #8888a0;
        }

        .hero .badge {
            display: inline-block;
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        /* ===== MOVIE GRID ===== */
        .movie-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 24px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        .movie-card .poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .movie-card .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .movie-card:hover .poster img {
            transform: scale(1.05);
        }

        .movie-card .poster .fallback {
            font-size: 48px;
            color: #6b6b80;
            text-align: center;
            padding: 20px;
        }

        /* Play button overlay - Netflix style */
        .movie-card .poster .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(2px);
        }

        .movie-card:hover .poster .play-overlay {
            opacity: 1;
        }

        .movie-card .poster .play-overlay .play-btn {
            width: 56px;
            height: 56px;
            background: rgba(245, 158, 11, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #0a0a0f;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }

        .movie-card:hover .poster .play-overlay .play-btn {
            transform: scale(1);
        }

        .movie-card .info {
            padding: 12px 14px 14px;
        }

        .movie-card .info h4 {
            font-size: 14px;
            font-weight: 600;
            color: #e8e8f0;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-card .info .meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #6b6b80;
        }

        .movie-card .info .meta .year {
            color: #6b6b80;
        }

        .movie-card .info .meta .dot {
            color: #3a3a4a;
        }

        .movie-card .info .genre-tag {
            display: inline-block;
            font-size: 11px;
            color: #8888a0;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 10px;
            border-radius: 100px;
            margin-top: 4px;
        }

        .movie-card .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid rgba(245, 158, 11, 0.15);
        }

        .movie-card .rating-badge .star {
            font-size: 10px;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6b6b80;
        }

        /* ===== FOOTER ===== */
        .footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 24px 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: #6b6b80;
        }

        /* ===== MODAL / MOVIE PLAYER ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: #14141c;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            position: relative;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #e8e8f0;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.1);
        }

        .modal-video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #0a0a0f;
        }

        .modal-video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-movie-info {
            padding: 20px 24px 24px;
        }

        .modal-movie-info h2 {
            font-size: 20px;
            font-weight: 700;
            color: #e8e8f0;
            margin-bottom: 4px;
        }

        .modal-movie-info .meta {
            font-size: 14px;
            color: #8888a0;
        }

        .modal-movie-info .description {
            font-size: 14px;
            color: #aaaac0;
            margin-top: 10px;
            line-height: 1.6;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 8px 12px 40px;
            }

            .hero {
                padding: 20px 16px 8px;
            }

            .movie-card .info {
                padding: 8px 10px 10px;
            }

            .movie-card .info h4 {
                font-size: 12px;
            }

            .movie-card .info .meta {
                font-size: 10px;
            }

            .movie-card .poster .play-overlay .play-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .modal-content {
                max-height: 95vh;
                border-radius: 12px;
            }

            .modal-movie-info {
                padding: 14px 16px 18px;
            }

            .modal-movie-info h2 {
                font-size: 17px;
            }

            .modal-close {
                top: 8px;
                right: 10px;
                width: 32px;
                height: 32px;
                font-size: 18px;
            }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            .movie-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 901px) and (max-width: 1200px) {
            .movie-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Cheap<span>Shot</span></div>
            <a href="/" class="back-btn">← Back to Home</a>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="badge">✅ 100% LEGAL</div>
        <h1>🎬 <span class="highlight">Free</span> YouTube Movies</h1>
        <p>Click any movie to watch instantly — completely free, no sign-up required.</p>
    </section>

    <!-- ===== MOVIE GRID ===== -->
    <div class="movie-grid" id="movieGrid">
        <!-- Movies will be loaded here -->
    </div>

    <!-- ===== MODAL (Movie Player) ===== -->
    <div class="modal-overlay" id="movieModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-video-wrapper">
                <iframe id="movieIframe" src="" allowfullscreen loading="lazy"></iframe>
            </div>
            <div class="modal-movie-info">
                <h2 id="modalTitle">Movie Title</h2>
                <div class="meta" id="modalMeta">2024 · Drama</div>
                <div class="description" id="modalDesc">Movie description goes here.</div>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <div class="footer">
        <p>© 2026 CheapShot — All movies are legally free on YouTube.</p>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ============================================================
        // 📽️  ADD YOUR MOVIES HERE — SUPER SIMPLE!
        // ============================================================
        // Just paste the YouTube URL. The title, thumbnail, and 
        // description auto-fetch from YouTube.
        // ============================================================

        const movies = [
            // === ADD YOUR MOVIES BELOW ===
            {
                url: "https://www.youtube.com/watch?v=0LZk1Jogf-U",
                // Optional: Override auto-fetched data
                // title: "Custom Title",
                // year: "1955",
                // genre: "Thriller",
                // description: "Custom description"
            },
            {
                url: "https://www.youtube.com/watch?v=6Sx7q8Xm6WE",
            },
            {
                url: "https://www.youtube.com/watch?v=9k5-Cq88p30",
            },
            {
                url: "https://www.youtube.com/watch?v=YrXhMsCmnlM",
            },
            {
                url: "https://www.youtube.com/watch?v=GpDpa3w4hZE",
            },
            {
                url: "https://www.youtube.com/watch?v=9VjRwzPJPTE",
            },
            {
                url: "https://www.youtube.com/watch?v=6_IO-q5X6QQ",
            },
            // === ADD MORE MOVIES BELOW (just copy the pattern) ===
            // { url: "https://www.youtube.com/watch?v=VIDEO_ID" },
        ];

        // ============================================================
        // 🎬  AUTO-GENERATE THE MOVIE CARDS
        // ============================================================

        // YouTube oEmbed API to fetch video metadata
        async function fetchVideoData(url) {
            try {
                const videoId = extractYouTubeId(url);
                if (!videoId) return null;

                const response = await fetch(
                    `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`
                );
                const data = await response.json();
                return {
                    title: data.title || 'Unknown Title',
                    author: data.author_name || 'Unknown',
                    thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
                    embedUrl: `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`
                };
            } catch (error) {
                console.error('Failed to fetch video data:', error);
                return null;
            }
        }

        function extractYouTubeId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([^&]+)/,
                /(?:youtu\.be\/)([^?]+)/,
                /(?:youtube\.com\/embed\/)([^?]+)/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // Generate a "year" from video ID (fallback)
        function generateYear() {
            const years = ['2024', '2023', '2022', '2021', '2020', '2019', '2018', '2017', '2016', '2015'];
            return years[Math.floor(Math.random() * years.length)];
        }

        function generateGenre() {
            const genres = ['Drama', 'Comedy', 'Action', 'Thriller', 'Sci-Fi', 'Horror', 'Romance', 'Adventure', 'Documentary',
                'Fantasy'
            ];
            return genres[Math.floor(Math.random() * genres.length)];
        }

        // Render movies
        async function renderMovies() {
            const grid = document.getElementById('movieGrid');

            if (movies.length === 0) {
                grid.innerHTML = `<div class="loading">🎥 No movies added yet. Check back soon!</div>`;
                return;
            }

            // Show loading state
            grid.innerHTML = `<div class="loading">⏳ Loading movies...</div>`;

            const movieData = [];

            for (const movie of movies) {
                const data = await fetchVideoData(movie.url);
                if (data) {
                    movieData.push({
                        ...data,
                        // Use custom overrides if provided
                        title: movie.title || data.title,
                        year: movie.year || generateYear(),
                        genre: movie.genre || generateGenre(),
                        description: movie.description || `${data.title} — A classic film available for free on YouTube.`,
                        url: movie.url,
                        embedUrl: data.embedUrl
                    });
                } else {
                    // Fallback if fetch fails
                    const videoId = extractYouTubeId(movie.url);
                    movieData.push({
                        title: movie.title || 'Unknown Movie',
                        year: movie.year || generateYear(),
                        genre: movie.genre || generateGenre(),
                        description: movie.description || 'Watch this free movie on YouTube.',
                        url: movie.url,
                        embedUrl: `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`,
                        thumbnail: videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : ''
                    });
                }
            }

            // Render the grid
            grid.innerHTML = movieData.map((movie, index) => `
                <div class="movie-card" onclick="openMovie(${index})">
                    <div class="poster">
                        ${movie.thumbnail ? 
                            `<img src="${movie.thumbnail}" alt="${movie.title}" loading="lazy" onerror="this.style.display='none'">` : 
                            `<div class="fallback">🎬</div>`
                        }
                        <div class="play-overlay">
                            <div class="play-btn">▶</div>
                        </div>
                    </div>
                    <div class="info">
                        <h4>${movie.title}</h4>
                        <div class="meta">
                            <span class="year">${movie.year}</span>
                            <span class="dot">·</span>
                            <span>${movie.genre}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // Store movie data for modal
            window._movieData = movieData;
        }

        // ===== MODAL FUNCTIONS =====
        function openMovie(index) {
            const data = window._movieData[index];
            if (!data) return;

            const modal = document.getElementById('movieModal');
            const iframe = document.getElementById('movieIframe');
            const title = document.getElementById('modalTitle');
            const meta = document.getElementById('modalMeta');
            const desc = document.getElementById('modalDesc');

            iframe.src = data.embedUrl;
            title.textContent = data.title;
            meta.textContent = `${data.year} · ${data.genre}`;
            desc.textContent = data.description;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('movieModal');
            const iframe = document.getElementById('movieIframe');

            modal.classList.remove('active');
            iframe.src = ''; // Stop video
            document.body.style.overflow = '';
        }

        // Close modal on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on overlay click
        document.getElementById('movieModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // ===== LOAD MOVIES =====
        renderMovies();

        console.log(`✅ ${movies.length} movies loaded!`);
    </script>

</body>
</html>
