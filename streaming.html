<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Movies - CheapShot</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e8e8f0;
            line-height: 1.6;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #14141c;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a4a;
        }

        /* ===== NAVIGATION ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 24px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-weight: 400;
            -webkit-text-fill-color: #6b6b80;
        }

        .back-btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #8888a0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s;
            background: transparent;
            cursor: pointer;
        }

        .back-btn:hover {
            color: #e8e8f0;
            background: rgba(255, 255, 255, 0.05);
        }

        /* ===== HERO ===== */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 20px;
        }

        .hero h1 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 16px;
            color: #8888a0;
            max-width: 600px;
        }

        /* ===== MOVIE GRID ===== */
        .movie-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            border-color: rgba(245, 158, 11, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .movie-card .poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .movie-card .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .movie-card:hover .poster img {
            transform: scale(1.05);
        }

        .movie-card .poster .fallback {
            font-size: 48px;
            color: #6b6b80;
            text-align: center;
            padding: 20px;
        }

        .movie-card .poster .play-btn {
            position: absolute;
            width: 48px;
            height: 48px;
            background: rgba(245, 158, 11, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #0a0a0f;
            opacity: 0;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .movie-card:hover .poster .play-btn {
            opacity: 1;
        }

        .movie-card .info {
            padding: 14px 16px 16px;
        }

        .movie-card .info h4 {
            font-size: 15px;
            font-weight: 600;
            color: #e8e8f0;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-card .info .year {
            font-size: 13px;
            color: #6b6b80;
        }

        .movie-card .info .genre {
            font-size: 12px;
            color: #8888a0;
            margin-top: 4px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 10px;
            border-radius: 100px;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6b6b80;
        }

        /* ===== FOOTER ===== */
        .footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 24px 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: #6b6b80;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                padding: 12px 16px 40px;
            }

            .hero {
                padding: 24px 16px 12px;
            }

            .movie-card .info {
                padding: 10px 12px 12px;
            }

            .movie-card .info h4 {
                font-size: 13px;
            }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            .movie-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Cheap<span>Shot</span></div>
            <a href="/" class="back-btn">← Back to Home</a>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <h1>🎬 <span class="highlight">Free</span> YouTube Movies</h1>
        <p>100% legal, completely free movies hosted on YouTube. Click any movie to watch.</p>
    </section>

    <!-- ===== MOVIE GRID ===== -->
    <div class="movie-grid" id="movieGrid">
        <!-- Movies will be loaded here -->
    </div>

    <!-- ===== FOOTER ===== -->
    <div class="footer">
        <p>© 2026 CheapShot — All movies are legally free on YouTube.</p>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ============================================================
        // 📽️  ADD YOUR MOVIES HERE — EASY COPY-PASTE
        // ============================================================
        // Just paste your YouTube URLs below. The poster will auto-load.
        // If no poster found, it shows a fallback icon.
        // ============================================================

        const movies = [
            // === ADD YOUR MOVIES BELOW ===
            {
                title: "The Night of the Hunter",
                year: "1955",
                genre: "Thriller",
                url: "https://www.youtube.com/watch?v=0LZk1Jogf-U",
                poster: "" // Leave empty to auto-fetch, or paste direct image URL
            },
            {
                title: "The Big Lebowski",
                year: "1998",
                genre: "Comedy",
                url: "https://www.youtube.com/watch?v=6Sx7q8Xm6WE",
                poster: ""
            },
            {
                title: "The Red Balloon",
                year: "1956",
                genre: "Family",
                url: "https://www.youtube.com/watch?v=9k5-Cq88p30",
                poster: ""
            },
            {
                title: "Sherlock Jr.",
                year: "1924",
                genre: "Comedy",
                url: "https://www.youtube.com/watch?v=YrXhMsCmnlM",
                poster: ""
            },
            {
                title: "The General",
                year: "1926",
                genre: "Adventure",
                url: "https://www.youtube.com/watch?v=GpDpa3w4hZE",
                poster: ""
            },
            {
                title: "A Trip to the Moon",
                year: "1902",
                genre: "Sci-Fi",
                url: "https://www.youtube.com/watch?v=9VjRwzPJPTE",
                poster: ""
            },
            // === ADD MORE MOVIES BELOW (just copy the pattern) ===
            // Example:
            // {
            //     title: "My Movie Name",
            //     year: "2020",
            //     genre: "Action",
            //     url: "https://www.youtube.com/watch?v=VIDEO_ID",
            //     poster: "" // Leave empty to auto-fetch, or paste image URL
            // },
        ];

        // ============================================================
        // 🎬  AUTO-GENERATE THE MOVIE CARDS
        // ============================================================

        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            
            if (movies.length === 0) {
                grid.innerHTML = `<div class="loading">🎥 No movies added yet. Check back soon!</div>`;
                return;
            }

            grid.innerHTML = movies.map(movie => {
                // Auto-generate poster URL from YouTube ID
                let posterUrl = movie.poster;
                if (!posterUrl && movie.url) {
                    const videoId = extractYouTubeId(movie.url);
                    if (videoId) {
                        posterUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                    }
                }

                return `
                    <div class="movie-card" onclick="window.open('${movie.url}', '_blank')">
                        <div class="poster">
                            ${posterUrl ? 
                                `<img src="${posterUrl}" alt="${movie.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'fallback\\'>🎬</div>'">` : 
                                `<div class="fallback">🎬</div>`
                            }
                            <div class="play-btn">▶</div>
                        </div>
                        <div class="info">
                            <h4>${movie.title}</h4>
                            <div class="year">${movie.year}</div>
                            <span class="genre">${movie.genre}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function extractYouTubeId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([^&]+)/,
                /(?:youtu\.be\/)([^?]+)/,
                /(?:youtube\.com\/embed\/)([^?]+)/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // ===== LOAD MOVIES =====
        renderMovies();

        // Add this if you want to auto-refresh the page when you add movies
        console.log(`✅ ${movies.length} movies loaded!`);
    </script>

</body>
</html>
